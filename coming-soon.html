<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | Dylan Portfolio</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --bg2: #111111;
        --border: rgba(255, 255, 255, 0.08);
        --text: #f0ede8;
        --muted: #888880;
        --accent: #1d9e75;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        padding: 2rem;
      }
      .card {
        max-width: 560px;
        width: 100%;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.01)
        );
        border: 0.5px solid var(--border);
        border-radius: 20px;
        padding: 2.5rem;
        text-align: center;
      }
      .eyebrow {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 1rem;
      }
      h1 {
        font-size: clamp(28px, 4vw, 40px);
        margin-bottom: 1rem;
        letter-spacing: -1px;
      }
      p {
        color: var(--muted);
        line-height: 1.7;
        margin-bottom: 1.5rem;
      }
      a {
        display: inline-block;
        text-decoration: none;
        color: var(--accent);
        font-family: "DM Mono", monospace;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="eyebrow">Project Update</div>
      <h1>Coming Soon</h1>
      <p>
        Project is currently being prepared for launch. I’ll share the full case
        study, demo, and details here soon.
      </p>
      <a href="index.html">← Back to portfolio</a>
    </div>
  </body>
</html>
